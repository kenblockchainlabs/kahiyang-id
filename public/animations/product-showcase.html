<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', -apple-system, sans-serif; }

.container {
  width: 400px; height: 700px;
  background: #0a0a0a;
  position: relative;
  overflow: hidden;
  border-radius: 20px;
}

/* Grid pattern */
.grid-pattern {
  position: absolute; inset: 0;
  background-image: 
    linear-gradient(rgba(200,255,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,255,0,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridMove 20s linear infinite;
}
@keyframes gridMove {
  0% { transform: translate(0, 0); }
  100% { transform: translate(40px, 40px); }
}

/* Glow */
.glow {
  position: absolute;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(200,255,0,0.15) 0%, transparent 70%);
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation: glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse {
  0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
}

/* Content */
.content {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; padding: 40px;
  text-align: center;
}

/* Badge */
.badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 20px; border-radius: 100px;
  background: rgba(200,255,0,0.08);
  border: 1px solid rgba(200,255,0,0.2);
  color: #C8FF00; font-size: 11px; font-weight: 600;
  letter-spacing: 0.15em; text-transform: uppercase;
  opacity: 0; animation: fadeUp 0.8s ease forwards 0.3s;
}
.badge .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #C8FF00;
  animation: blink 1.5s ease infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Main text */
.main-text {
  margin-top: 32px;
  opacity: 0; animation: fadeUp 0.8s ease forwards 0.6s;
}
.main-text .line1 {
  font-size: 48px; font-weight: 900; color: #fff;
  letter-spacing: -0.04em; line-height: 1;
}
.main-text .line2 {
  font-size: 48px; font-weight: 900; color: #C8FF00;
  letter-spacing: -0.04em; line-height: 1;
}
.main-text .line3 {
  font-size: 48px; font-weight: 900; color: #ff6b35;
  letter-spacing: -0.04em; line-height: 1;
}

/* Sub */
.sub {
  margin-top: 20px;
  font-size: 14px; color: rgba(255,255,255,0.4);
  line-height: 1.7; max-width: 300px;
  opacity: 0; animation: fadeUp 0.8s ease forwards 0.9s;
}

/* Product */
.product {
  margin-top: 40px;
  display: flex; gap: 16px;
  opacity: 0; animation: fadeUp 0.8s ease forwards 1.2s;
}
.product-item {
  width: 100px; height: 120px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 8px;
  transition: all 0.3s;
}
.product-item:hover {
  border-color: rgba(200,255,0,0.3);
  transform: translateY(-4px);
}
.product-icon {
  font-size: 32px;
}
.product-label {
  font-size: 10px; color: rgba(255,255,255,0.4);
  text-transform: uppercase; letter-spacing: 0.1em;
}

/* Price */
.price {
  margin-top: 32px;
  opacity: 0; animation: fadeUp 0.8s ease forwards 1.5s;
}
.price-old {
  font-size: 16px; color: rgba(255,255,255,0.3);
  text-decoration: line-through;
}
.price-new {
  font-size: 40px; font-weight: 900; color: #C8FF00;
  letter-spacing: -0.02em;
}
.price-sub {
  font-size: 11px; color: rgba(255,255,255,0.3);
  margin-top: 4px;
}

/* CTA */
.cta {
  margin-top: 32px;
  padding: 14px 32px; border-radius: 100px;
  background: #C8FF00; color: #0a0a0a;
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  border: none; cursor: pointer;
  opacity: 0; animation: fadeUp 0.8s ease forwards 1.8s;
  transition: all 0.2s;
}
.cta:hover { transform: scale(1.05); }

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Stats bar */
.stats-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  display: flex; justify-content: space-around;
  padding: 20px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  border-top: 1px solid rgba(255,255,255,0.06);
  opacity: 0; animation: fadeUp 0.8s ease forwards 2.1s;
}
.stat { text-align: center; }
.stat-num { font-size: 20px; font-weight: 900; color: #C8FF00; }
.stat-label { font-size: 9px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }
</style>
</head>
<body>
<div class="container">
  <div class="grid-pattern"></div>
  <div class="glow"></div>
  
  <div class="content">
    <div class="badge">
      <span class="dot"></span>
      Bundle Herbal
    </div>
    
    <div class="main-text">
      <div class="line1">ODOL</div>
      <div class="line2">+</div>
      <div class="line3">SABUN</div>
    </div>
    
    <div class="sub">
      Bahan alami. Tanpa kimia. Gigi putih, kulit halus.
    </div>
    
    <div class="product">
      <div class="product-item">
        <div class="product-icon">🦷</div>
        <div class="product-label">Odol</div>
      </div>
      <div class="product-item">
        <div class="product-icon">🧼</div>
        <div class="product-label">Sabun</div>
      </div>
    </div>
    
    <div class="price">
      <div class="price-old">Rp 50.000</div>
      <div class="price-new">Rp 25.000</div>
      <div class="price-sub">Hemat 50% — Bundle spesial</div>
    </div>
    
    <button class="cta">Pesan Sekarang →</button>
  </div>
  
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-num">500+</div>
      <div class="stat-label">Terjual</div>
    </div>
    <div class="stat">
      <div class="stat-num">4.9</div>
      <div class="stat-label">Rating</div>
    </div>
    <div class="stat">
      <div class="stat-num">100%</div>
      <div class="stat-label">Herbal</div>
    </div>
  </div>
</div>
</body>
</html>
