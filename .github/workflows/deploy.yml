name: Deploy to Vercel
on:
  push:
    branches: [master]

env:
  VERCEL_ORG_ID: team_Y97i4lUoj6XPGPtFBJ7ALEa9
  VERCEL_PROJECT_ID: prj_VAaWcYpjShij4bcHcN3NQzdFGi2O

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - run: npm ci
      
      - run: npx vercel --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
